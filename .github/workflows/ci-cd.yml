name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente para deploy manual'
        required: true
        type: choice
        options:
          - uat
          - prod
      image_tag:
        description: 'SHA da imagem (ex: 2bd5ada5969f3daabf4a0d9080915c78d873adf4)'
        required: true
        type: string

env:
  DOCKER_USER: gustavomr
  IMAGE_TAG: ${{ github.sha }}

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build Backend
        run: mvn package -DskipTests -q
        working-directory: ./backend

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Build Frontend
        run: |
          npm install
          npm run build
        working-directory: ./frontend

  build-and-deploy-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build Backend
        run: mvn package -DskipTests -q
        working-directory: ./backend

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Build Frontend
        run: |
          npm install
          npm run build
        working-directory: ./frontend

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.DOCKER_USER }}/app-backend:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_USER }}/app-backend:latest

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.DOCKER_USER }}/app-frontend:${{ env.IMAGE_TAG }}
            ${{ env.DOCKER_USER }}/app-frontend:latest

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure Kube Config
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG" > $HOME/.kube/config

      - name: Deploy to Dev
        run: |
          kubectl apply -f k8s/dev/namespace.yaml
          kubectl apply -f k8s/dev/
          kubectl set image deployment/backend backend=${{ env.DOCKER_USER }}/app-backend:${{ env.IMAGE_TAG }} -n dev
          kubectl set image deployment/frontend frontend=${{ env.DOCKER_USER }}/app-frontend:${{ env.IMAGE_TAG }} -n dev
          kubectl rollout status deployment/backend -n dev
          kubectl rollout status deployment/frontend -n dev

  deploy-to-uat:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'uat'
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure Kube Config
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG" > $HOME/.kube/config

      - name: Deploy to UAT
        run: |
          kubectl apply -f k8s/uat/namespace.yaml
          kubectl apply -f k8s/uat/
          kubectl set image deployment/backend backend=${{ env.DOCKER_USER }}/app-backend:${{ github.event.inputs.image_tag }} -n uat
          kubectl set image deployment/frontend frontend=${{ env.DOCKER_USER }}/app-frontend:${{ github.event.inputs.image_tag }} -n uat
          kubectl rollout status deployment/backend -n uat
          kubectl rollout status deployment/frontend -n uat

  deploy-to-prod:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure Kube Config
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG" > $HOME/.kube/config

      - name: Deploy to Prod
        run: |
          kubectl apply -f k8s/prod/namespace.yaml
          kubectl apply -f k8s/prod/
          kubectl set image deployment/backend backend=${{ env.DOCKER_USER }}/app-backend:${{ github.event.inputs.image_tag }} -n prod
          kubectl set image deployment/frontend frontend=${{ env.DOCKER_USER }}/app-frontend:${{ github.event.inputs.image_tag }} -n prod
          kubectl rollout status deployment/backend -n prod
          kubectl rollout status deployment/frontend -n prod
