name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

env:
  DOCKER_USER: gustavomr

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build Backend
        run: mvn package -DskipTests -q
        working-directory: ./backend

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Build Frontend
        run: |
          npm install
          npm run build
        working-directory: ./frontend

  build-and-deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build Backend
        run: mvn package -DskipTests -q
        working-directory: ./backend

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Build Frontend
        run: |
          npm install
          npm run build
        working-directory: ./frontend

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.DOCKER_USER }}/app-backend:${{ github.sha }}
            ${{ env.DOCKER_USER }}/app-backend:dev
            ${{ env.DOCKER_USER }}/app-backend:uat
            ${{ env.DOCKER_USER }}/app-backend:prod

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.DOCKER_USER }}/app-frontend:${{ github.sha }}
            ${{ env.DOCKER_USER }}/app-frontend:dev
            ${{ env.DOCKER_USER }}/app-frontend:uat
            ${{ env.DOCKER_USER }}/app-frontend:prod

      - name: Update manifests with SHA
        run: |
          sed -i "s|image: .*/app-backend:.*|image: ${{ env.DOCKER_USER }}/app-backend:${{ github.sha }}|" k8s/dev/deployment.yaml
          sed -i "s|image: .*/app-frontend:.*|image: ${{ env.DOCKER_USER }}/app-frontend:${{ github.sha }}|" k8s/dev/deployment.yaml
          sed -i "s|image: .*/app-backend:.*|image: ${{ env.DOCKER_USER }}/app-backend:${{ github.sha }}|" k8s/uat/deployment.yaml
          sed -i "s|image: .*/app-frontend:.*|image: ${{ env.DOCKER_USER }}/app-frontend:${{ github.sha }}|" k8s/uat/deployment.yaml
          sed -i "s|image: .*/app-backend:.*|image: ${{ env.DOCKER_USER }}/app-backend:${{ github.sha }}|" k8s/prod/deployment.yaml
          sed -i "s|image: .*/app-frontend:.*|image: ${{ env.DOCKER_USER }}/app-frontend:${{ github.sha }}|" k8s/prod/deployment.yaml

      - name: Commit and push manifests
        run: |
          git config user.name "CI/CD Bot"
          git config user.email "ci-cd@users.noreply.github.com"
          git add k8s/dev/deployment.yaml k8s/uat/deployment.yaml k8s/prod/deployment.yaml
          git diff --staged --quiet || git commit -m "chore: atualiza manifests para ${{ github.sha }} [skip ci]"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}
          git push