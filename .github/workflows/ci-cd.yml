name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente para deploy manual'
        required: true
        type: choice
        options:
          - uat
          - prod
      image_tag:
        description: 'SHA da imagem (opcional — se vazio, promove do ambiente anterior; preencher para rollback)'
        required: false
        type: string

env:
  DOCKER_USER: gustavomr

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build Backend
        run: mvn package -DskipTests -q
        working-directory: ./backend

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Build Frontend
        run: |
          npm install
          npm run build
        working-directory: ./frontend

  build-and-deploy-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build Backend
        run: mvn package -DskipTests -q
        working-directory: ./backend

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Build Frontend
        run: |
          npm install
          npm run build
        working-directory: ./frontend

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.DOCKER_USER }}/app-backend:${{ github.sha }}
            ${{ env.DOCKER_USER }}/app-backend:dev

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.DOCKER_USER }}/app-frontend:${{ github.sha }}
            ${{ env.DOCKER_USER }}/app-frontend:dev

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure Kube Config
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG" > $HOME/.kube/config

      - name: Deploy to Dev
        run: |
          kubectl apply -f k8s/dev/namespace.yaml
          kubectl apply -f k8s/dev/
          kubectl set image deployment/backend backend=${{ env.DOCKER_USER }}/app-backend:${{ github.sha }} -n dev
          kubectl set image deployment/frontend frontend=${{ env.DOCKER_USER }}/app-frontend:${{ github.sha }} -n dev
          kubectl rollout status deployment/backend -n dev
          kubectl rollout status deployment/frontend -n dev

  deploy-to-uat:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'uat'
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure Kube Config
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG" > $HOME/.kube/config

      - name: Obter SHA
        id: sha
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
          ENV: ${{ github.event.inputs.environment }}
        run: |
          if [ -n "$IMAGE_TAG" ]; then
            echo "sha=$IMAGE_TAG" >> $GITHUB_OUTPUT
          else
            SHA=$(kubectl get deploy backend -n dev -o jsonpath='{.spec.template.spec.containers[0].image}' | cut -d: -f2)
            echo "sha=$SHA" >> $GITHUB_OUTPUT
          fi

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag imagem como uat
        run: |
          docker buildx imagetools create \
            ${{ env.DOCKER_USER }}/app-backend:${{ steps.sha.outputs.sha }} \
            --tag ${{ env.DOCKER_USER }}/app-backend:uat
          docker buildx imagetools create \
            ${{ env.DOCKER_USER }}/app-frontend:${{ steps.sha.outputs.sha }} \
            --tag ${{ env.DOCKER_USER }}/app-frontend:uat

      - name: Deploy to UAT
        run: |
          kubectl apply -f k8s/uat/namespace.yaml
          kubectl apply -f k8s/uat/
          kubectl set image deployment/backend backend=${{ env.DOCKER_USER }}/app-backend:${{ steps.sha.outputs.sha }} -n uat
          kubectl set image deployment/frontend frontend=${{ env.DOCKER_USER }}/app-frontend:${{ steps.sha.outputs.sha }} -n uat
          kubectl rollout status deployment/backend -n uat
          kubectl rollout status deployment/frontend -n uat

  deploy-to-prod:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Configure Kube Config
        env:
          KUBE_CONFIG: ${{ secrets.KUBE_CONFIG }}
        run: |
          mkdir -p $HOME/.kube
          echo "$KUBE_CONFIG" > $HOME/.kube/config

      - name: Obter SHA
        id: sha
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          if [ -n "$IMAGE_TAG" ]; then
            echo "sha=$IMAGE_TAG" >> $GITHUB_OUTPUT
          else
            SHA=$(kubectl get deploy backend -n uat -o jsonpath='{.spec.template.spec.containers[0].image}' | cut -d: -f2)
            echo "sha=$SHA" >> $GITHUB_OUTPUT
          fi

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag imagem como prod
        run: |
          docker buildx imagetools create \
            ${{ env.DOCKER_USER }}/app-backend:${{ steps.sha.outputs.sha }} \
            --tag ${{ env.DOCKER_USER }}/app-backend:prod
          docker buildx imagetools create \
            ${{ env.DOCKER_USER }}/app-frontend:${{ steps.sha.outputs.sha }} \
            --tag ${{ env.DOCKER_USER }}/app-frontend:prod

      - name: Deploy to Prod
        run: |
          kubectl apply -f k8s/prod/namespace.yaml
          kubectl apply -f k8s/prod/
          kubectl set image deployment/backend backend=${{ env.DOCKER_USER }}/app-backend:${{ steps.sha.outputs.sha }} -n prod
          kubectl set image deployment/frontend frontend=${{ env.DOCKER_USER }}/app-frontend:${{ steps.sha.outputs.sha }} -n prod
          kubectl rollout status deployment/backend -n prod
          kubectl rollout status deployment/frontend -n prod
