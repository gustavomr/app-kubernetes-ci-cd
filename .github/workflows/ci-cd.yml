name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Ambiente para deploy manual'
        required: true
        type: choice
        options:
          - uat
          - prod
      image_tag:
        description: 'SHA da imagem (vazio = promove do anterior; preencher para rollback)'
        required: false
        type: string

env:
  DOCKER_USER: gustavomr

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build Backend
        run: mvn package -DskipTests -q
        working-directory: ./backend

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Build Frontend
        run: |
          npm install
          npm run build
        working-directory: ./frontend

  build-and-deploy-dev:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin
          cache: maven

      - name: Build Backend
        run: mvn package -DskipTests -q
        working-directory: ./backend

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: ./frontend/package-lock.json

      - name: Build Frontend
        run: |
          npm install
          npm run build
        working-directory: ./frontend

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Setup QEMU
        uses: docker/setup-qemu-action@v3

      - name: Setup Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.DOCKER_USER }}/app-backend:${{ github.sha }}
            ${{ env.DOCKER_USER }}/app-backend:dev

      - name: Build and Push Frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          platforms: linux/arm64
          tags: |
            ${{ env.DOCKER_USER }}/app-frontend:${{ github.sha }}
            ${{ env.DOCKER_USER }}/app-frontend:dev

      - name: Update dev manifests with SHA
        run: |
          sed -i "s|image: .*/app-backend:.*|image: ${{ env.DOCKER_USER }}/app-backend:${{ github.sha }}|" k8s/dev/deployment.yaml
          sed -i "s|image: .*/app-frontend:.*|image: ${{ env.DOCKER_USER }}/app-frontend:${{ github.sha }}|" k8s/dev/deployment.yaml

      - name: Commit and push dev manifests
        run: |
          git config user.name "CI/CD Bot"
          git config user.email "ci-cd@users.noreply.github.com"
          git add k8s/dev/deployment.yaml
          git diff --staged --quiet || git commit -m "chore: atualiza dev para ${{ github.sha }} [skip ci]"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}
          git push

  promote-to-uat:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'uat'
    runs-on: ubuntu-latest
    environment: uat
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Obter SHA
        id: sha
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          if [ -n "$IMAGE_TAG" ]; then
            echo "sha=$IMAGE_TAG" >> $GITHUB_OUTPUT
          else
            SHA=$(grep -m1 'image: .*/app-backend:' k8s/dev/deployment.yaml | sed 's|.*app-backend:||')
            echo "sha=$SHA" >> $GITHUB_OUTPUT
          fi

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag imagem como uat
        run: |
          docker buildx imagetools create \
            ${{ env.DOCKER_USER }}/app-backend:${{ steps.sha.outputs.sha }} \
            --tag ${{ env.DOCKER_USER }}/app-backend:uat
          docker buildx imagetools create \
            ${{ env.DOCKER_USER }}/app-frontend:${{ steps.sha.outputs.sha }} \
            --tag ${{ env.DOCKER_USER }}/app-frontend:uat

      - name: Update uat manifests
        run: |
          sed -i "s|image: .*/app-backend:.*|image: ${{ env.DOCKER_USER }}/app-backend:${{ steps.sha.outputs.sha }}|" k8s/uat/deployment.yaml
          sed -i "s|image: .*/app-frontend:.*|image: ${{ env.DOCKER_USER }}/app-frontend:${{ steps.sha.outputs.sha }}|" k8s/uat/deployment.yaml

      - name: Commit and push uat manifests
        run: |
          git config user.name "CI/CD Bot"
          git config user.email "ci-cd@users.noreply.github.com"
          git add k8s/uat/deployment.yaml
          git diff --staged --quiet || git commit -m "chore: promove ${{ steps.sha.outputs.sha }} para uat [skip ci]"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}
          git push

  promote-to-prod:
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'prod'
    runs-on: ubuntu-latest
    environment: prod
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}
          fetch-depth: 0

      - name: Obter SHA
        id: sha
        env:
          IMAGE_TAG: ${{ github.event.inputs.image_tag }}
        run: |
          if [ -n "$IMAGE_TAG" ]; then
            echo "sha=$IMAGE_TAG" >> $GITHUB_OUTPUT
          else
            SHA=$(grep -m1 'image: .*/app-backend:' k8s/uat/deployment.yaml | sed 's|.*app-backend:||')
            echo "sha=$SHA" >> $GITHUB_OUTPUT
          fi

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag imagem como prod
        run: |
          docker buildx imagetools create \
            ${{ env.DOCKER_USER }}/app-backend:${{ steps.sha.outputs.sha }} \
            --tag ${{ env.DOCKER_USER }}/app-backend:prod
          docker buildx imagetools create \
            ${{ env.DOCKER_USER }}/app-frontend:${{ steps.sha.outputs.sha }} \
            --tag ${{ env.DOCKER_USER }}/app-frontend:prod

      - name: Update prod manifests
        run: |
          sed -i "s|image: .*/app-backend:.*|image: ${{ env.DOCKER_USER }}/app-backend:${{ steps.sha.outputs.sha }}|" k8s/prod/deployment.yaml
          sed -i "s|image: .*/app-frontend:.*|image: ${{ env.DOCKER_USER }}/app-frontend:${{ steps.sha.outputs.sha }}|" k8s/prod/deployment.yaml

      - name: Commit and push prod manifests
        run: |
          git config user.name "CI/CD Bot"
          git config user.email "ci-cd@users.noreply.github.com"
          git add k8s/prod/deployment.yaml
          git diff --staged --quiet || git commit -m "chore: promove ${{ steps.sha.outputs.sha }} para prod [skip ci]"
          git remote set-url origin https://x-access-token:${{ secrets.GH_PAT }}@github.com/${{ github.repository }}
          git push